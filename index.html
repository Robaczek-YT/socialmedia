<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Linki - Robaczek</title>
    <style>
        /* Stylizacja strony */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #252540);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #444;
            margin-bottom: 15px;
            border: 3px solid #ff4757;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            border-color: #ff4757;
        }

        /* Kolory specyficzne dla platform */
        .youtube:hover { border-color: #ff0000; color: #ff0000; }
        .github:hover { border-color: #ffffff; color: #ffffff; }
        .roblox:hover { border-color: #00b0ff; color: #00b0ff; }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img" style="display: flex; align-items: center; justify-content: center; font-size: 40px;">🐛</div>
        
        <h1>Robaczek</h1>
        <p>Sprawdź moją twórczość i projekty!</p>

        <div class="links">
            <a href="https://www.youtube.com/channel/UCFjnGpAHsHlIuOdxF2kISVw" class="link-card youtube" target="_blank">
                📺 Mój Kanał YouTube
            </a>

            <a href="https://github.com/Robaczek-YT" class="link-card github" target="_blank">
                💻 GitHub (Mój kod)
            </a>

            <a href="https://www.roblox.com/pl/games/86651449454463/Sword-Fight-Flex-Your-Time" class="link-card roblox" target="_blank">
                ⚔️ Zagraj w Sword Fight na Roblox
            </a>
        </div>
    </div>

</body>
</html>
